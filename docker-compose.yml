# ============================================
# Medical Assistant - Docker Compose 配置
# 编排多服务容器化部署
# ============================================

version: '3.8'

services:
  # ==========================================
  # 主应用服务 - FastAPI
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-assistant-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 应用配置
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000

      # LLM 配置 (从 .env 文件读取)
      - MODEL_NAME=${MODEL_NAME}
      - MODEL_URL=${MODEL_URL}
      - MODEL_API_KEY=${MODEL_API_KEY}
      - MODEL_TEMPERATURE=${MODEL_TEMPERATURE:-0.2}
#      - RERANKER_MODEL_PATH=${RERANKER_MODEL_PATH}
      - RERANKER_MODEL_PATH=/app/models/bge-reranker-onnx

      # Embedding 配置
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}

      # 数据库配置 - PostgreSQL (用于检查点存储)
      - DATABASE_URL=postgresql://postgres:postgres@medical-assistant-postgres:5432/medical_assistant_db

      # Redis 配置 (用于缓存)
      - REDIS_URL=redis://redis:6379/0

      # 缓存配置
      - ENABLE_QUERY_CACHE=true
      - CACHE_TTL_SECONDS=3600
      - ENABLE_SEMANTIC_CACHE=true
      - SEMANTIC_CACHE_THRESHOLD=0.80

      # 日志配置
      - LOG_LEVEL=INFO
    volumes:
      # 挂在本地模型到容器内
      - ./bge-reranker-onnx:/app/models/bge-reranker-onnx:ro
      # 持久化向量数据库
#      - ./data/chroma_db:/app/data/chroma_db
      - D:\Agent\medical_assistant_agent\data\chroma_db:/app/data/chroma_db
      # 持久化 BM25 索引
      - ./app/api/data:/app/app/api/data
      # 日志目录
      - ./logs:/app/logs
      # 文档目录 (如果需要动态更新)
      - ./docs:/app/docs
      - ./data:/app/data

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - medical-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # PostgreSQL 服务 - 检查点持久化存储
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: medical-assistant-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=medical_assistant_db
    volumes:
      # 使用本地目录挂载
      - D:/BaiduNetdiskDownload/posgresql/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - medical-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d medical_assistant_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis 服务 - 查询缓存
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: medical-assistant-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      # 数据持久化
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - medical-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

# ==========================================
# 网络配置
# ==========================================
networks:
  medical-network:
    driver: bridge

# ==========================================
# 数据卷配置
# ==========================================
volumes:
  redis_data:
    driver: local