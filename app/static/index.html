<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医疗助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 500;
        }

        .config-bar {
            background: white;
            padding: 12px 24px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .config-bar label {
            font-size: 14px;
            color: #666;
        }

        .config-bar input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            width: 150px;
        }

        .config-bar select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
        }

        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
        }

        .message.assistant {
            background: white;
            color: #333;
            align-self: flex-start;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .message.assistant .warning {
            margin-top: 12px;
            padding: 8px 12px;
            background: #fff3cd;
            border-radius: 6px;
            font-size: 12px;
            color: #856404;
        }

        .message.assistant .sources {
            margin-top: 12px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
        }

        .input-container {
            background: white;
            padding: 16px 24px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-container textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .input-container textarea:focus {
            border-color: #667eea;
        }

        .upload-btn {
            width: 44px;
            height: 44px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #666;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .upload-btn:hover {
            background: #e0e0e0;
            color: #333;
        }

        .upload-btn.has-image {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .image-preview {
            display: none;
            padding: 8px 24px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .image-preview.show {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .image-preview img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 8px;
            object-fit: cover;
        }

        .image-preview .image-info {
            font-size: 13px;
            color: #666;
        }

        .image-preview .remove-image {
            padding: 4px 12px;
            background: #ff4d4f;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .image-preview .remove-image:hover {
            background: #d9363e;
        }

        .input-container button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .input-container button:hover {
            transform: scale(1.05);
        }

        .input-container button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        .clear-btn {
            padding: 8px 16px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>🏥 医疗助手</h1>
</div>

<div class="config-bar">
    <label>用户ID：</label>
    <input type="text" id="userId" placeholder="输入用户ID" value="test_user">

    <label>会话ID：</label>
    <input type="text" id="threadId" placeholder="留空自动生成">

    <label>输出模式：</label>
    <select id="streamMode">
        <option value="stream">流式输出</option>
        <option value="sync">同步输出</option>
    </select>

    <button class="clear-btn" onclick="clearChat()">清空对话</button>
</div>

<div class="chat-container" id="chatContainer">
    <div class="message assistant">
        您好！我是医疗助手，可以为您解答健康相关问题。请问有什么可以帮助您的？
    </div>
</div>

<div class="image-preview" id="imagePreview">
    <img id="previewImg" src="" alt="预览">
    <div class="image-info">
        <div id="imageName"></div>
        <div id="imageSize"></div>
    </div>
    <button class="remove-image" onclick="removeImage()">移除</button>
</div>

<div class="input-container">
    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
    <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('imageInput').click()" title="上传图片">📎</button>
        <textarea
                id="userInput"
                placeholder="输入您的问题..."
                rows="1"
                onkeydown="handleKeyDown(event)"
        ></textarea>
    <button id="sendBtn" onclick="sendMessage()">发送</button>
</div>

<script>
    const API_BASE = window.location.origin;
    let isStreaming = false;
    let currentImageBase64 = null;

    // 自动调整输入框高度
    const textarea = document.getElementById('userInput');
    textarea.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // 回车发送
    function handleKeyDown(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }

    // 图片上传处理
    function handleImageUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        // 限制大小5MB
        if (file.size > 5 * 1024 * 1024) {
            alert('图片大小不能超过5MB');
            event.target.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64 = e.target.result.split(',')[1];
            currentImageBase64 = base64;

            // 显示预览
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('imageName').textContent = file.name;
            document.getElementById('imageSize').textContent = (file.size / 1024).toFixed(1) + ' KB';
            document.getElementById('imagePreview').classList.add('show');
            document.getElementById('uploadBtn').classList.add('has-image');
        };
        reader.readAsDataURL(file);
    }

    // 移除图片
    function removeImage() {
        currentImageBase64 = null;
        document.getElementById('imageInput').value = '';
        document.getElementById('imagePreview').classList.remove('show');
        document.getElementById('uploadBtn').classList.remove('has-image');
    }

    // 发送消息
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const question = input.value.trim();

        if ((!question && !currentImageBase64) || isStreaming) return;

        const userId = document.getElementById('userId').value || 'default';
        const threadId = document.getElementById('threadId').value || null;
        const streamMode = document.getElementById('streamMode').value;

        // 添加用户消息（带图片标记）
        const displayText = currentImageBase64 ? (question || '请帮我看看这张图片') + ' 🖼️' : question;
        addMessage(displayText, 'user');
        input.value = '';
        input.style.height = 'auto';

        // 保存图片并清除
        const imageBase64 = currentImageBase64;
        removeImage();

        // 禁用发送按钮
        isStreaming = true;
        document.getElementById('sendBtn').disabled = true;

        // 显示加载动画
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message assistant typing';
        loadingDiv.innerHTML = '<span></span><span></span><span></span>';
        document.getElementById('chatContainer').appendChild(loadingDiv);
        scrollToBottom();

        try {
            if (streamMode === 'stream') {
                await sendStreamRequest(question, userId, threadId, loadingDiv, imageBase64);
            } else {
                await sendSyncRequest(question, userId, threadId, loadingDiv, imageBase64);
            }
        } catch (error) {
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `抱歉，发生错误：${error.message}`;
        } finally {
            isStreaming = false;
            document.getElementById('sendBtn').disabled = false;
        }
    }

    // 流式请求
    async function sendStreamRequest(question, userId, threadId, loadingDiv, imageBase64) {
        const body = {
            question: question,
            user_id: userId,
            thread_id: threadId
        };
        if (imageBase64) {
            body.image_base64 = imageBase64;
        }

        const response = await fetch(`${API_BASE}/api/chat/stream`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });

        loadingDiv.className = 'message assistant';
        loadingDiv.innerHTML = '';

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullAnswer = '';
        let currentSources = [];
        let buffer = '';  // SSE 跨 chunk 缓冲

        while (true) {
            const {done, value} = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, {stream: true});

            // 按双换行分割完整的 SSE 事件
            const parts = buffer.split('\n\n');
            // 最后一段可能不完整，留在 buffer 等下次拼接
            buffer = parts.pop() || '';

            for (const part of parts) {
                const line = part.trim();
                if (!line.startsWith('data: ')) continue;
                const data = line.slice(6);

                if (data === '[DONE]') {
                    if (currentSources.length > 0) {
                        const sourcesDiv = document.createElement('div');
                        sourcesDiv.className = 'sources';
                        sourcesDiv.innerHTML = '📚 来源：' + currentSources.map(s => s.source).join(', ');
                        loadingDiv.appendChild(sourcesDiv);
                        scrollToBottom();
                    }
                    continue;
                }

                if (data.startsWith('[ERROR]')) {
                    loadingDiv.innerHTML = data;
                    continue;
                }

                try {
                    const parsed = JSON.parse(data);
                    if (typeof parsed === 'string') {
                        // token 文本（json.dumps("xxx") → "xxx"）
                        fullAnswer += parsed;
                        loadingDiv.innerHTML = formatAnswer(fullAnswer);
                        scrollToBottom();
                    } else if (parsed && parsed.type === 'sources') {
                        // 文档来源元数据事件
                        currentSources = parsed.sources || [];
                    }
                    // 其他对象类型忽略，不拼接到答案
                } catch (e) {
                    // JSON 解析失败，忽略（不拼接到答案，避免 [object Object]）
                }
            }
        }
    }

    // 同步请求
    async function sendSyncRequest(question, userId, threadId, loadingDiv, imageBase64) {
        const body = {
            question: question,
            user_id: userId,
            thread_id: threadId
        };
        if (imageBase64) {
            body.image_base64 = imageBase64;
        }

        const response = await fetch(`${API_BASE}/api/chat`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });

        const data = await response.json();

        loadingDiv.className = 'message assistant';
        let html = formatAnswer(data.answer || '抱歉，我无法回答这个问题。');

        if (data.warnings && data.warnings.length > 0) {
            html += `<div class="warning">⚠️ ${data.warnings.join('<br>')}</div>`;
        }

        if (data.sources && data.sources.length > 0) {
            html += `<div class="sources">📚 来源：${data.sources.map(s => s.source).join(', ')}</div>`;
        }

        loadingDiv.innerHTML = html;
        scrollToBottom();
    }

    // 添加消息
    function addMessage(content, role) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.textContent = content;
        document.getElementById('chatContainer').appendChild(div);
        scrollToBottom();
    }

    // 格式化答案
    function formatAnswer(text) {
        return text
            .replace(/\n/g, '<br>')
            .replace(/### (.*)/g, '<strong>$1</strong>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    // 滚动到底部
    function scrollToBottom() {
        const container = document.getElementById('chatContainer');
        container.scrollTop = container.scrollHeight;
    }

    // 清空对话
    function clearChat() {
        document.getElementById('chatContainer').innerHTML = `
                <div class="message assistant">
                    您好！我是医疗助手，可以为您解答健康相关问题。请问有什么可以帮助您的？
                </div>
            `;
        document.getElementById('threadId').value = '';
    }
</script>
</body>
</html>
